---
- name: Set kubeconfig environment
  set_fact:
    kubeconfig_env:
      KUBECONFIG: "{{ hub_kubeconfig }}"

- name: Create namespace for CNV policies
  kubernetes.core.k8s:
    kubeconfig: "{{ hub_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ cnv_policy_namespace }}"

- name: Create OpenShift Virtualization policy
  kubernetes.core.k8s:
    kubeconfig: "{{ hub_kubeconfig }}"
    state: present
    definition:
      apiVersion: policy.open-cluster-management.io/v1
      kind: Policy
      metadata:
        name: policy-openshift-virtualization
        namespace: "{{ cnv_policy_namespace }}"
        annotations:
          policy.open-cluster-management.io/standards: NIST-CSF
          policy.open-cluster-management.io/categories: PR.IP Information Protection Processes and Procedures
          policy.open-cluster-management.io/controls: PR.IP-1 Baseline Configuration
      spec:
        remediationAction: enforce
        disabled: false
        policy-templates:
          - objectDefinition:
              apiVersion: policy.open-cluster-management.io/v1
              kind: ConfigurationPolicy
              metadata:
                name: policy-openshift-virtualization-namespace
              spec:
                remediationAction: enforce
                severity: high
                object-templates:
                  - complianceType: musthave
                    objectDefinition:
                      apiVersion: v1
                      kind: Namespace
                      metadata:
                        name: "{{ cnv_namespace }}"
          - objectDefinition:
              apiVersion: policy.open-cluster-management.io/v1
              kind: ConfigurationPolicy
              metadata:
                name: policy-openshift-virtualization-operatorgroup
              spec:
                remediationAction: enforce
                severity: high
                object-templates:
                  - complianceType: musthave
                    objectDefinition:
                      apiVersion: operators.coreos.com/v1
                      kind: OperatorGroup
                      metadata:
                        name: kubevirt-hyperconverged-group
                        namespace: "{{ cnv_namespace }}"
                      spec:
                        targetNamespaces:
                          - "{{ cnv_namespace }}"
          - objectDefinition:
              apiVersion: policy.open-cluster-management.io/v1
              kind: ConfigurationPolicy
              metadata:
                name: policy-openshift-virtualization-subscription
              spec:
                remediationAction: enforce
                severity: high
                object-templates:
                  - complianceType: musthave
                    objectDefinition:
                      apiVersion: operators.coreos.com/v1alpha1
                      kind: Subscription
                      metadata:
                        name: hco-operatorhub
                        namespace: "{{ cnv_namespace }}"
                      spec:
                        source: redhat-operators
                        sourceNamespace: openshift-marketplace
                        name: kubevirt-hyperconverged
                        channel: "{{ cnv_operator_channel }}"
                        installPlanApproval: Automatic
          - objectDefinition:
              apiVersion: policy.open-cluster-management.io/v1
              kind: ConfigurationPolicy
              metadata:
                name: policy-openshift-virtualization-hyperconverged
              spec:
                remediationAction: enforce
                severity: high
                object-templates:
                  - complianceType: musthave
                    objectDefinition:
                      apiVersion: hco.kubevirt.io/v1beta1
                      kind: HyperConverged
                      metadata:
                        name: kubevirt-hyperconverged
                        namespace: "{{ cnv_namespace }}"
                      spec: {}

- name: Create PlacementRule for all clusters
  kubernetes.core.k8s:
    kubeconfig: "{{ hub_kubeconfig }}"
    state: present
    definition:
      apiVersion: apps.open-cluster-management.io/v1
      kind: PlacementRule
      metadata:
        name: placement-openshift-virtualization
        namespace: "{{ cnv_policy_namespace }}"
      spec:
        clusterSelector:
          matchExpressions:
            - key: vendor
              operator: In
              values:
                - OpenShift

- name: Create PlacementBinding
  kubernetes.core.k8s:
    kubeconfig: "{{ hub_kubeconfig }}"
    state: present
    definition:
      apiVersion: policy.open-cluster-management.io/v1
      kind: PlacementBinding
      metadata:
        name: binding-openshift-virtualization
        namespace: "{{ cnv_policy_namespace }}"
      placementRef:
        name: placement-openshift-virtualization
        kind: PlacementRule
        apiGroup: apps.open-cluster-management.io
      subjects:
        - name: policy-openshift-virtualization
          kind: Policy
          apiGroup: policy.open-cluster-management.io

- name: Wait for policy compliance on both clusters
  shell: |
    oc get policy policy-openshift-virtualization -n {{ cnv_policy_namespace }} -o json | \
    jq -r '.status.status[] | select(.compliant=="Compliant") | .clustername' | wc -l
  environment: "{{ kubeconfig_env }}"
  register: compliant_clusters
  until: compliant_clusters.stdout | int >= 2
  retries: "{{ operator_timeout_minutes | int }}"
  delay: 60
  changed_when: false

- name: Verify HyperConverged is ready on hub cluster
  shell: |
    oc get hyperconverged kubevirt-hyperconverged -n {{ cnv_namespace }} -o jsonpath='{.status.conditions[?(@.type=="Available")].status}'
  environment:
    KUBECONFIG: "{{ clusters[0].install_dir }}/auth/kubeconfig"
  register: hc_hub_status
  until: hc_hub_status.stdout == "True"
  retries: 15
  delay: 60
  changed_when: false

- name: Display CNV deployment status
  debug:
    msg:
      - "OpenShift Virtualization deployed successfully via ACM policy"
      - "Compliant clusters: {{ compliant_clusters.stdout }}"
      - "Policy namespace: {{ cnv_policy_namespace }}"
