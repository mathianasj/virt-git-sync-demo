---
- name: Set kubeconfig environment
  set_fact:
    kubeconfig_env:
      KUBECONFIG: "{{ kubeconfig_path }}"

- name: Include operator installation tasks
  include_tasks: operator.yml

- name: Include MultiClusterHub installation tasks
  include_tasks: multiclusterhub.yml

- name: Get OpenShift console route (ACM is integrated)
  shell: |
    oc get route console -n openshift-console -o jsonpath='{.spec.host}'
  environment: "{{ kubeconfig_env }}"
  register: console_route
  changed_when: false

- name: Display ACM console URL
  debug:
    msg:
      - "ACM is integrated with the OpenShift console"
      - "OpenShift Console URL: https://{{ console_route.stdout }}"
      - "Navigate to 'All Clusters' in the OpenShift console to access ACM"
