---
- name: Monitor OpenShift installation progress
  block:
    - name: Check installation status via tmux or log file
      shell: |
        if tmux has-session -t {{ tmux_session }} 2>/dev/null; then
          tmux capture-pane -t {{ tmux_session }} -p | tail -50
        elif [ -f {{ install_dir }}/install.log ]; then
          tail -100 {{ install_dir }}/install.log
        else
          echo "NO_INSTALL_RUNNING"
        fi
      register: install_status
      until: >
        'Install complete!' in install_status.stdout or
        existing_cluster.stat.exists
      retries: "{{ (installation_timeout_minutes | int) }}"
      delay: 60
      changed_when: false
      failed_when: >
        ('NO_INSTALL_RUNNING' in install_status.stdout or
        'failed' in install_status.stdout.lower()) and
        not existing_cluster.stat.exists

    - name: Check if tmux session disappeared (installation complete)
      shell: tmux has-session -t {{ tmux_session }} 2>/dev/null
      register: tmux_check_final
      failed_when: false
      changed_when: false

    - name: Verify kubeconfig was created
      stat:
        path: "{{ install_dir }}/auth/kubeconfig"
      register: final_kubeconfig

    - name: Fail if installation did not complete successfully
      fail:
        msg: "OpenShift installation for {{ cluster_name }} failed. Check {{ install_dir }}/install.log for details"
      when: not final_kubeconfig.stat.exists

    - name: Display installation completion
      debug:
        msg:
          - "OpenShift cluster {{ cluster_name }} installation complete!"
          - "Kubeconfig: {{ install_dir }}/auth/kubeconfig"
          - "Kubeadmin password: {{ install_dir }}/auth/kubeadmin-password"
      when: final_kubeconfig.stat.exists

    - name: Check if kubeadmin password file exists
      stat:
        path: "{{ install_dir }}/auth/kubeadmin-password"
      register: kubeadmin_pass_file
      when: final_kubeconfig.stat.exists

    - name: Read kubeadmin password
      slurp:
        src: "{{ install_dir }}/auth/kubeadmin-password"
      register: kubeadmin_pass
      when:
        - final_kubeconfig.stat.exists
        - kubeadmin_pass_file.stat.exists

    - name: Log installation completion
      lineinfile:
        path: "{{ log_file }}"
        line: "{{ ansible_date_time.date }} {{ ansible_date_time.time }} - OpenShift installation for {{ cluster_name }} completed successfully"
        create: no
      when: final_kubeconfig.stat.exists

  when: not (existing_cluster.stat.exists | default(false))

- name: Use existing cluster
  debug:
    msg: "Using existing cluster {{ cluster_name }} at {{ install_dir }}"
  when: existing_cluster.stat.exists
