---
- name: Set cluster variables
  set_fact:
    cluster_name: "{{ cluster_config.cluster_name }}"
    install_dir: "{{ cluster_config.install_dir }}"
    tmux_session: "{{ cluster_config.tmux_session }}"

- name: Include install-config creation tasks
  include_tasks: install_config.yml

- name: Include tmux check tasks
  include_tasks: tmux_check.yml

- name: Include installation monitoring tasks
  include_tasks: monitor_install.yml

- name: Update state file with cluster status
  shell: |
    jq '.clusters["{{ cluster_name }}"] = {
      "status": "complete",
      "install_dir": "{{ install_dir }}",
      "completed_at": "{{ ansible_date_time.iso8601 }}"
    }' {{ state_file }} > {{ state_file }}.tmp && mv {{ state_file }}.tmp {{ state_file }}
  args:
    executable: /bin/bash
