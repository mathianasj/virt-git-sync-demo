---
# Create MachineConfigs for BGP routing on bare metal nodes (before MachineSets)
- name: Create MachineConfig for bare metal BGP routing on all clusters
  include_tasks: create_machineconfig.yml
  loop: "{{ clusters }}"
  loop_control:
    loop_var: cluster_config
    label: "{{ cluster_config.cluster_name }}"

# Deploy bare metal machinesets in parallel to both clusters
- name: Create bare metal machinesets on all clusters in parallel
  include_tasks: direct_parallel.yml
  loop: "{{ clusters }}"
  loop_control:
    loop_var: cluster_config
    label: "{{ cluster_config.cluster_name }}"

- name: Wait for all cluster machineset deployments to complete
  async_status:
    jid: "{{ item.job_id }}"
  loop: "{{ async_jobs }}"
  loop_control:
    label: "{{ item.cluster }}"
  register: async_results
  until: async_results.finished
  retries: 60
  delay: 60

- name: Display deployment results
  debug:
    msg: "{{ item.stdout_lines }}"
  loop: "{{ async_results.results }}"
  loop_control:
    label: "{{ item.item.cluster }}"

- name: Verify CNV-labeled nodes on both clusters
  shell: |
    export KUBECONFIG={{ item.install_dir }}/auth/kubeconfig
    oc get nodes -l node-role.kubernetes.io/worker-cnv --no-headers | wc -l
  loop: "{{ clusters }}"
  loop_control:
    label: "{{ item.cluster_name }}"
  register: cnv_node_counts
  changed_when: false

- name: Display bare metal deployment summary
  debug:
    msg:
      - "=========================================="
      - "Bare Metal Deployment Complete"
      - "=========================================="
      - "MachineConfig: 98-worker-cnv-bgp-gateway"
      - "  - Applied to: worker-cnv role"
      - "  - Hub default gateway: {{ hub_router_ip }}"
      - "  - Managed default gateway: {{ managed_router_ip }}"
      - "  - Method: NetworkManager (nmcli)"
      - "  - Script: /usr/local/bin/set-gw.sh"
      - ""
      - "MachineSets deployed in parallel to all clusters"
      - "  - Instance type: {{ bare_metal_instance_type }}"
      - "  - Replicas per cluster: {{ bare_metal_replicas }}"
      - "  - Hub cluster CNV nodes: {{ cnv_node_counts.results[0].stdout }}"
      - "  - Managed cluster CNV nodes: {{ cnv_node_counts.results[1].stdout }}"
      - "  - Total bare metal nodes: {{ (cnv_node_counts.results[0].stdout | int) + (cnv_node_counts.results[1].stdout | int) }}"
      - ""
      - "Routing Configuration:"
      - "  - Primary interface default gateway → BGP router"
      - "  - Configured via NetworkManager connection"
      - "  - BGP router handles external connectivity"
      - "  - Applied automatically via MachineConfig"
      - "  - Follows Red Hat solution guide"
      - "=========================================="
