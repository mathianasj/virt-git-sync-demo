---
- name: Create cluster working directories
  file:
    path: "{{ item.install_dir }}"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'
  loop: "{{ clusters }}"

- name: Copy pull secret to bastion
  copy:
    src: /tmp/pull-secret.json
    dest: /home/ec2-user/pull-secret.json
    owner: ec2-user
    group: ec2-user
    mode: '0600'

- name: Copy ocp-bastion public key to bastion for OpenShift clusters
  copy:
    src: "{{ lookup('env', 'HOME') }}/.ssh/{{ bastion_key_name }}.pub"
    dest: /home/ec2-user/.ssh/openshift-key.pub
    owner: ec2-user
    group: ec2-user
    mode: '0644'

- name: Copy ocp-bastion private key to bastion for OpenShift cluster access
  copy:
    src: "{{ lookup('env', 'HOME') }}/.ssh/{{ bastion_key_name }}"
    dest: /home/ec2-user/.ssh/openshift-key
    owner: ec2-user
    group: ec2-user
    mode: '0600'

- name: Copy ocp-bastion private key to bastion with original name (for router access)
  copy:
    src: "{{ lookup('env', 'HOME') }}/.ssh/{{ bastion_key_name }}"
    dest: /home/ec2-user/.ssh/{{ bastion_key_name }}
    owner: ec2-user
    group: ec2-user
    mode: '0600'

- name: Create .aws directory on bastion
  file:
    path: /home/ec2-user/.aws
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'

- name: Check if AWS credentials file exists locally
  stat:
    path: /tmp/aws-installer-credentials
  register: aws_creds_file
  delegate_to: localhost
  become: no

- name: Copy AWS installer credentials to bastion
  copy:
    src: /tmp/aws-installer-credentials
    dest: /home/ec2-user/.aws/credentials
    owner: ec2-user
    group: ec2-user
    mode: '0600'
  when: aws_creds_file.stat.exists

- name: Remove local credentials file (security cleanup)
  file:
    path: /tmp/aws-installer-credentials
    state: absent
  delegate_to: localhost
  become: no
  when: aws_creds_file.stat.exists

- name: Create state tracking file
  copy:
    content: |
      {
        "deployment_started": "{{ ansible_date_time.iso8601 }}",
        "clusters": {}
      }
    dest: "{{ state_file }}"
    owner: ec2-user
    group: ec2-user
    mode: '0644'
    force: no

- name: Create log directory
  file:
    path: "{{ log_file | dirname }}"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'

- name: Initialize log file
  copy:
    content: |
      ========================================
      OpenShift Dual Cluster Deployment Log
      Started: {{ ansible_date_time.iso8601 }}
      ========================================
    dest: "{{ log_file }}"
    owner: ec2-user
    group: ec2-user
    mode: '0644'
    force: no
