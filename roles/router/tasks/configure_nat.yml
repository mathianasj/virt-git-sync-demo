  changed_when: false

- name: Display managed router NAT configuration
  debug:
    var: managed_nat_config.stdout_lines

- name: NAT configuration summary
  debug:
    msg:
      - "=========================================="
      - "Router NAT Configuration Complete"
      - "=========================================="
      - "Hub Router:"
      - "  NAT Gateway IP: {{ hub_nat_gateway_ip }}"
      - "  Default Route: via {{ hub_nat_gateway_ip }} dev ens6"
      - "  NAT Rule: MASQUERADE on ens6"
      - ""
      - "Managed Router:"
      - "  NAT Gateway IP: {{ managed_nat_gateway_ip }}"
      - "  Default Route: via {{ managed_nat_gateway_ip }} dev ens6"
      - "  NAT Rule: MASQUERADE on ens6"
      - ""
      - "Both routers configured for internet access via NAT gateway"
