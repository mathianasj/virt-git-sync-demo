    echo "ENS5: $ENS5_IP/$ENS5_SUBNET, Gateway: $ENS5_GW"
    echo "ENS6: $ENS6_IP/$ENS6_SUBNET, Gateway: $ENS6_GW (NAT GW: {{ managed_nat_gateway_ip }})"

    # Add routing tables to /etc/iproute2/rt_tables if not already present
