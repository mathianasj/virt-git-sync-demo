    BASTION_IP="{{ bastion_public_ip.stdout }}"
    for IP in {{ managed_router_ips_raw.stdout }}; do
      echo "Testing connectivity to $IP..." >&2
      if ssh -i ~/.ssh/{{ bastion_key_name }} \
        -o ConnectTimeout=5 \
