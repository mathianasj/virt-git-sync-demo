    ENS5_SUBNET=$(ip addr show ens5 | grep 'inet ' | awk '{print $2}' | cut -d/ -f2)
    ENS6_SUBNET=$(ip addr show ens6 | grep 'inet ' | awk '{print $2}' | cut -d/ -f2)
    ENS5_GW=$(echo $ENS5_IP | awk -F. '{print $1"."$2"."$3".1"}')
