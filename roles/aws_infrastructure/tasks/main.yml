---
- name: Include VPC tasks (multi-VPC with peering)
  include_tasks: vpc_multi.yml

- name: Include security groups tasks (multi-VPC)
  include_tasks: security_groups_multi.yml

- name: Include IAM tasks
  include_tasks: iam.yml

- name: Include bastion tasks
  include_tasks: bastion.yml

- name: Save infrastructure state
  copy:
    content: |
      {
        "bastion_vpc_id": "{{ bastion_vpc_id }}",
        "bastion_public_subnet_id": "{{ bastion_public_subnet_id }}",
        "vpc_map": {{ vpc_map | to_json }},
        "vpc_public_subnets": {{ vpc_public_subnets | to_json }},
        "vpc_private_subnets": {{ vpc_private_subnets | to_json }},
        "bastion_instance_id": "{{ bastion_instance.instances[0].instance_id }}",
        "bastion_public_ip": "{{ bastion_public_ip }}",
        "security_group_ids": {
          "bastion": "{{ bastion_sg_id }}",
          "hub_cluster": "{{ hub_cluster_sg_id }}",
          "managed_cluster": "{{ managed_cluster_sg_id }}"
        }
      }
    dest: /tmp/aws-infrastructure-state.json
    mode: '0644'
