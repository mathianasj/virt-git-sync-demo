---
- name: Phase 8 - OpenShift Virtualization Deployment via ACM
  hosts: bastion
  gather_facts: no
  become: yes
  vars_files:
    - /tmp/selected-domain.yml
  pre_tasks:
    - name: Load global variables
      include_vars:
        file: "{{ playbook_dir }}/../group_vars/all.yml"

    - name: Update clusters configuration with selected domain
      set_fact:
        clusters: |
          {% set updated_clusters = [] %}
          {% for cluster in clusters %}
          {% set _ = cluster.update({'base_domain': selected_base_domain}) %}
          {% set _ = updated_clusters.append(cluster) %}
          {% endfor %}
          {{ updated_clusters }}
  vars:
    hub_cluster: "{{ clusters[0] }}"

  tasks:
    - name: Deploy OpenShift Virtualization policy
      include_role:
        name: cnv_policy
      vars:
        hub_kubeconfig: "{{ hub_cluster.install_dir }}/auth/kubeconfig"

  post_tasks:
    - name: Display OpenShift Virtualization deployment status
      debug:
        msg:
          - "OpenShift Virtualization deployed via ACM policy"
          - "Target clusters: Both hub and managed"
          - "Operator namespace: {{ cnv_namespace }}"
          - "HyperConverged CR: Deployed"
          - "Verify: oc get hyperconverged -n {{ cnv_namespace }}"
