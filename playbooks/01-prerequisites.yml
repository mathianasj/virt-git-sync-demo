---
- name: Phase 1 - Prerequisites Check
  hosts: localhost
  gather_facts: yes
  become: no
  tasks:
    - name: Load global variables
      include_vars:
        file: "{{ playbook_dir }}/../group_vars/all.yml"

    - name: Display phase timing information
      debug:
        msg:
          - "=========================================="
          - "Phase 1: Prerequisites Check"
          - "=========================================="
          - "Expected Runtime: 2-5 minutes"
          - "Started: {{ ansible_date_time.time }}"
          - "Estimated Completion: {{ '%02d:%02d' | format((ansible_date_time.hour | int + ((ansible_date_time.minute | int + 5) // 60)) % 24, (ansible_date_time.minute | int + 5) % 60) }}"
          - "=========================================="

    - name: Check for AWS credentials
      command: aws sts get-caller-identity
      register: aws_identity
      changed_when: false

    - name: Display AWS identity
      debug:
        msg: "Using AWS Account: {{ (aws_identity.stdout | from_json).Account }}"

    - name: Check if clusters are already deployed
      shell: |
        aws ec2 describe-instances \
          --region {{ aws_region }} \
          --filters "Name=tag:Name,Values=*{{ clusters[0].cluster_name }}*" "Name=instance-state-name,Values=running,stopped" \
          --query 'Reservations[*].Instances[*].InstanceId' \
          --output text | wc -w
      register: existing_cluster_check
      changed_when: false
      failed_when: false

    - name: Set cluster exists flag
      set_fact:
        clusters_exist: "{{ (existing_cluster_check.stdout | trim | int) > 0 }}"

    - name: Display cluster status
      debug:
        msg: "Existing clusters detected - skipping quota checks"
      when: clusters_exist | bool

    - name: Check Elastic IP quota and usage
      shell: |
        aws service-quotas get-service-quota \
          --service-code ec2 \
          --quota-code L-0263D0A3 \
          --region {{ aws_region }} \
          --query 'Quota.Value' --output text 2>/dev/null || echo "5"
      register: eip_quota_raw
      changed_when: false
      failed_when: false
      when: not (clusters_exist | default(false) | bool)

    - name: Check current Elastic IP usage
      shell: |
        aws ec2 describe-addresses --region {{ aws_region }} --query 'length(Addresses)' --output text
      register: eip_usage_raw
      changed_when: false
      when: not (clusters_exist | default(false) | bool)

    - name: Set EIP facts
      set_fact:
        eip_quota: "{{ eip_quota_raw.stdout | trim | int }}"
        eip_usage: "{{ eip_usage_raw.stdout | trim | int }}"
        eip_required: 8  # 3 NAT gateways + ~5 for two OpenShift clusters (LBs, etc.)
      when: not (clusters_exist | default(false) | bool)

    - name: Calculate EIP availability
      set_fact:
        eip_available: "{{ (eip_quota | int) - (eip_usage | int) }}"
      when: not (clusters_exist | default(false) | bool)

    - name: Check VPC quota
      shell: |
        aws service-quotas get-service-quota \
          --service-code vpc \
          --quota-code L-F678F1CE \
          --region {{ aws_region }} \
          --query 'Quota.Value' --output text 2>/dev/null || echo "5"
      register: vpc_quota_raw
      changed_when: false
      failed_when: false
      when: not (clusters_exist | default(false) | bool)

    - name: Check current VPC usage
      shell: |
        aws ec2 describe-vpcs --region {{ aws_region }} --query 'length(Vpcs)' --output text
      register: vpc_usage_raw
      changed_when: false
      when: not (clusters_exist | default(false) | bool)

    - name: Set VPC facts
      set_fact:
        vpc_quota: "{{ vpc_quota_raw.stdout | trim | int }}"
        vpc_usage: "{{ vpc_usage_raw.stdout | trim | int }}"
      when: not (clusters_exist | default(false) | bool)

    - name: Display quota information
      debug:
        msg:
          - "AWS Quota Check:"
          - "  Elastic IPs: {{ eip_usage }}/{{ eip_quota }} used (need ~{{ eip_required }} for deployment)"
          - "  VPCs: {{ vpc_usage }}/{{ vpc_quota }} used (need 1 for deployment)"
          - "  Available EIPs: {{ eip_available }}"
      when: not (clusters_exist | default(false) | bool)

    - name: Warn if EIP quota may be insufficient
      debug:
        msg:
          - "=========================================="
          - "WARNING: Elastic IP Quota May Be Insufficient"
          - "=========================================="
          - "Current EIP quota: {{ eip_quota }}"
          - "Current EIP usage: {{ eip_usage }}"
          - "Estimated need: ~{{ eip_required }} EIPs"
          - "Available: {{ eip_available }}"
          - ""
          - "Two OpenShift clusters require:"
          - "  - 3 NAT Gateways (shared): 3 EIPs"
          - "  - Load Balancers per cluster: ~2-3 EIPs each"
          - "  - Total estimated: 8-10 EIPs"
          - ""
          - "To request quota increase:"
          - "  1. Go to: https://console.aws.amazon.com/servicequotas"
          - "  2. Search for 'EC2-VPC Elastic IPs'"
          - "  3. Request increase to at least 15"
          - "  4. Approval usually takes 15-30 minutes"
          - ""
          - "Or deploy clusters to different regions (see group_vars/all.yml)"
          - "=========================================="
      when:
        - not (clusters_exist | default(false) | bool)
        - (eip_available | int) < (eip_required | int)

    - name: Prompt for action when quota insufficient
      pause:
        prompt: |

          ==========================================
          Elastic IP Quota Insufficient
          ==========================================
          Available: {{ eip_available }} EIPs
          Required: ~{{ eip_required }} EIPs

          Options:
            1. Request quota increase and wait (recommended)
            2. Request quota increase but continue (risky)
            3. Continue anyway (will likely fail)
            4. Abort deployment

          Enter your choice (1-4)
      register: quota_action
      when:
        - not (clusters_exist | default(false) | bool)
        - (eip_available | int) < (eip_required | int)

    - name: Request Elastic IP quota increase
      shell: |
        aws service-quotas request-service-quota-increase \
          --service-code ec2 \
          --quota-code L-0263D0A3 \
          --desired-value 15 \
          --region {{ aws_region }} \
          --output json
      register: quota_request
      when:
        - not (clusters_exist | default(false) | bool)
        - (eip_available | int) < (eip_required | int)
        - quota_action.user_input | default('4') in ['1', '2']
      failed_when: false

    - name: Display quota request status
      debug:
        msg:
          - "Quota increase request submitted!"
          - "Request ID: {{ (quota_request.stdout | from_json).RequestedQuota.Id | default('N/A') }}"
          - "Status: {{ (quota_request.stdout | from_json).RequestedQuota.Status | default('N/A') }}"
          - "Desired value: 15 EIPs"
      when:
        - not (clusters_exist | default(false) | bool)
        - (eip_available | int) < (eip_required | int)
        - quota_action.user_input | default('4') in ['1', '2']
        - quota_request.rc == 0

    - name: Handle quota request failure
      debug:
        msg:
          - "WARNING: Quota request failed"
          - "Error: {{ quota_request.stderr | default('Unknown error') }}"
          - "You may need to request via AWS Console or Support"
      when:
        - not (clusters_exist | default(false) | bool)
        - (eip_available | int) < (eip_required | int)
        - quota_action.user_input | default('4') in ['1', '2']
        - quota_request.rc != 0

    - name: Wait for quota increase approval
      block:
        - name: Display waiting message
          debug:
            msg:
              - "=========================================="
              - "Waiting for quota increase approval..."
              - "This typically takes 15-30 minutes"
              - "Checking status every 60 seconds"
              - "Press Ctrl+C to abort (safe - request stays active)"
              - "=========================================="

        - name: Poll for quota approval
          shell: |
            aws service-quotas get-requested-service-quota-change \
              --request-id {{ (quota_request.stdout | from_json).RequestedQuota.Id }} \
              --region {{ aws_region }} \
              --query 'RequestedQuota.Status' \
              --output text
          register: quota_status
          until: quota_status.stdout in ['APPROVED', 'DENIED', 'CASE_CLOSED']
          retries: 60
          delay: 60
          changed_when: false

        - name: Check if approved
          assert:
            that:
              - quota_status.stdout == 'APPROVED'
            fail_msg: |
              Quota request was {{ quota_status.stdout }}.
              Please check AWS Console for details or contact AWS Support.
            success_msg: "Quota increase APPROVED! Continuing with deployment..."

        - name: Refresh quota values after approval
          shell: |
            aws service-quotas get-service-quota \
              --service-code ec2 \
              --quota-code L-0263D0A3 \
              --region {{ aws_region }} \
              --query 'Quota.Value' --output text
          register: eip_quota_updated
          changed_when: false

        - name: Display new quota
          debug:
            msg: "New Elastic IP quota: {{ eip_quota_updated.stdout }}"

      when:
        - not (clusters_exist | default(false) | bool)
        - (eip_available | int) < (eip_required | int)
        - quota_action.user_input | default('4') == '1'
        - quota_request.rc == 0

    - name: Abort if user chose to cancel
      fail:
        msg: "Deployment cancelled by user due to quota concerns"
      when:
        - not (clusters_exist | default(false) | bool)
        - (eip_available | int) < (eip_required | int)
        - quota_action.user_input | default('4') not in ['1', '2', '3']

    - name: Verify Ansible version
      assert:
        that:
          - ansible_version.full is version('2.9', '>=')
        fail_msg: "Ansible 2.9 or higher is required"

    - name: Check for required Python modules
      community.general.python_requirements_info:
        dependencies:
          - boto3
          - botocore
      register: python_deps
      failed_when: python_deps.not_found | length > 0

    - name: Verify pull secret file exists
      stat:
        path: /tmp/pull-secret.json
      register: pull_secret_stat
      failed_when: not pull_secret_stat.stat.exists

    - name: Query Route53 hosted zones
      command: aws route53 list-hosted-zones --query 'HostedZones[?Config.PrivateZone==`false`].[Name,Id]' --output json
      register: route53_zones_raw
      changed_when: false

    - name: Parse Route53 zones
      set_fact:
        route53_zones: "{{ route53_zones_raw.stdout | from_json }}"

    - name: Fail if no public hosted zones found
      fail:
        msg: |
          No public Route53 hosted zones found in this AWS account.
          Please create a Route53 hosted zone before running this playbook.
          Example: aws route53 create-hosted-zone --name yourdomain.com --caller-reference $(date +%s)
      when: route53_zones | length == 0

    - name: Auto-select domain if only one zone exists
      set_fact:
        selected_base_domain: "{{ route53_zones[0][0] | regex_replace('\\.$', '') }}"
      when: route53_zones | length == 1

    - name: Display auto-selected domain
      debug:
        msg: "Auto-selected Route53 domain: {{ selected_base_domain }}"
      when: route53_zones | length == 1

    - name: Prompt for domain selection if multiple zones exist
      pause:
        prompt: |
          Multiple Route53 hosted zones found. Please select one:
          {% for zone in route53_zones %}
          {{ loop.index }}. {{ zone[0] }}
          {% endfor %}
          Enter the number of your choice
      register: domain_choice
      when: route53_zones | length > 1

    - name: Set selected domain from user choice
      set_fact:
        selected_base_domain: "{{ route53_zones[domain_choice.user_input | int - 1][0] | regex_replace('\\.$', '') }}"
      when: route53_zones | length > 1

    - name: Update clusters configuration with selected domain
      set_fact:
        clusters: |
          {% set updated_clusters = [] %}
          {% for cluster in clusters %}
          {% set _ = cluster.update({'base_domain': selected_base_domain}) %}
          {% set _ = updated_clusters.append(cluster) %}
          {% endfor %}
          {{ updated_clusters }}

    - name: Save domain selection to file for later playbooks
      copy:
        content: |
          ---
          selected_base_domain: "{{ selected_base_domain }}"
        dest: /tmp/selected-domain.yml
        mode: '0644'

    - name: Display prerequisites check results
      debug:
        msg:
          - "=========================================="
          - "Prerequisites Check: PASSED"
          - "=========================================="
          - "AWS credentials: OK"
          - "Ansible version: {{ ansible_version.full }}"
          - "Python modules: OK"
          - "Pull secret: OK"
          - "Route53 domain: {{ selected_base_domain }}"
          - ""
          - "Deployment Configuration:"
          - "  Region: {{ aws_region }}"
          - "  Hub Cluster: {{ clusters[0].cluster_name }}.{{ selected_base_domain }}"
          - "  Managed Cluster: {{ clusters[1].cluster_name }}.{{ selected_base_domain }}"
          - "  OpenShift Version: {{ openshift_version }}"
          - "  Bare Metal Type: {{ bare_metal_instance_type }} ({{ bare_metal_replicas }} per cluster)"
          - ""
          - "OpenShift installer will run on bastion EC2 in tmux sessions"
          - "=========================================="
