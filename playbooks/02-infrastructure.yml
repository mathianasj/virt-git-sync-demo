---
- name: Phase 2 - AWS Infrastructure Setup
  hosts: localhost
  gather_facts: no
  vars_files:
    - /tmp/selected-domain.yml
  pre_tasks:
    - name: Update clusters configuration with selected domain
      set_fact:
        clusters: |
          {% set updated_clusters = [] %}
          {% for cluster in clusters %}
          {% set _ = cluster.update({'base_domain': selected_base_domain}) %}
          {% set _ = updated_clusters.append(cluster) %}
          {% endfor %}
          {{ updated_clusters }}
  roles:
    - aws_infrastructure

  post_tasks:
    - name: Display infrastructure details
      debug:
        msg:
          - "AWS infrastructure created successfully"
          - "VPC ID: {{ vpc_id }}"
          - "Bastion Public IP: {{ bastion_public_ip }}"
          - "Bastion SSH: ssh -i ~/.ssh/{{ bastion_key_name }} {{ bastion_user }}@{{ bastion_public_ip }}"

    - name: Wait for bastion to be reachable
      wait_for:
        host: "{{ bastion_public_ip }}"
        port: 22
        delay: 10
        timeout: 300
        state: started
