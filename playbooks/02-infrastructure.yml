---
- name: Phase 2 - AWS Infrastructure Setup
  hosts: localhost
  gather_facts: yes
  become: no
  vars_files:
    - /tmp/selected-domain.yml
  pre_tasks:
    - name: Load global variables
      include_vars:
        file: "{{ playbook_dir }}/../group_vars/all.yml"

    - name: Display phase timing information
      debug:
        msg:
          - "=========================================="
          - "Phase 2: AWS Infrastructure Setup"
          - "=========================================="
          - "Expected Runtime: 5-10 minutes"
          - "Started: {{ ansible_date_time.time }}"
          - "Estimated Completion: {{ '%02d:%02d' | format((ansible_date_time.hour | int + ((ansible_date_time.minute | int + 10) // 60)) % 24, (ansible_date_time.minute | int + 10) % 60) }}"
          - "=========================================="

    - name: Update clusters configuration with selected domain
      set_fact:
        clusters: |
          {% set updated_clusters = [] %}
          {% for cluster in clusters %}
          {% set _ = cluster.update({'base_domain': selected_base_domain}) %}
          {% set _ = updated_clusters.append(cluster) %}
          {% endfor %}
          {{ updated_clusters }}
  roles:
    - aws_infrastructure

  post_tasks:
    - name: Display infrastructure details
      debug:
        msg:
          - "AWS infrastructure created successfully"
          - "Bastion VPC ID: {{ bastion_vpc_id }} ({{ bastion_vpc.cidr }})"
          - "Hub VPC ID: {{ vpc_map['hub-cluster-vpc'] }} ({{ vpcs[0].cidr }})"
          - "Managed VPC ID: {{ vpc_map['managed-cluster-vpc'] }} ({{ vpcs[1].cidr }})"
          - "VPC Peering: {{ 'Enabled' if enable_vpc_peering else 'Disabled' }}"
          - "Bastion Public IP: {{ bastion_public_ip }}"
          - "Bastion SSH: ssh -i ~/.ssh/{{ bastion_key_name }} {{ bastion_user }}@{{ bastion_public_ip }}"

    - name: Wait for bastion to be reachable
      wait_for:
        host: "{{ bastion_public_ip }}"
        port: 22
        delay: 10
        timeout: 300
        state: started
