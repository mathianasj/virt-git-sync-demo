---
- name: Gather bastion information
  hosts: localhost
  gather_facts: no
  become: no
  vars_files:
    - /tmp/selected-domain.yml
  tasks:
    - name: Load global variables
      include_vars:
        file: "{{ playbook_dir }}/../group_vars/all.yml"

    - name: Display phase timing information
      debug:
        msg:
          - "=========================================="
          - "Phase 15: CUDN Network Setup"
          - "=========================================="
          - "Expected Runtime: 5-10 minutes"
          - "Started: {{ ansible_date_time.time }}"
          - "Estimated Completion: {{ '%02d:%02d' | format((ansible_date_time.hour | int + ((ansible_date_time.minute | int + 10) // 60)) % 24, (ansible_date_time.minute | int + 10) % 60) }}"
          - "=========================================="

    - name: Get bastion public IP from AWS
      shell: |
        aws ec2 describe-instances \
          --region {{ aws_region }} \
          --filters "Name=tag:Role,Values=bastion" "Name=instance-state-name,Values=running" \
          --query 'Reservations[0].Instances[0].PublicIpAddress' \
          --output text
      register: bastion_ip_result
      changed_when: false

    - name: Add bastion to inventory
      add_host:
        name: bastion_host
        groups: bastion_dynamic
        ansible_host: "{{ bastion_ip_result.stdout }}"
        ansible_user: "{{ bastion_user }}"
        ansible_ssh_private_key_file: "~/.ssh/{{ bastion_key_name }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
        ansible_python_interpreter: /usr/bin/python3

- name: Phase 15 - ClusterUserDefinedNetwork Deployment
  hosts: bastion_dynamic
  gather_facts: no
  become: yes
  vars_files:
    - /tmp/selected-domain.yml
  pre_tasks:
    - name: Load global variables
      include_vars:
        file: "{{ playbook_dir }}/../group_vars/all.yml"

    - name: Update clusters configuration with selected domain
      set_fact:
        clusters: |
          {% set updated_clusters = [] %}
          {% for cluster in clusters %}
          {% set _ = cluster.update({'base_domain': selected_base_domain}) %}
          {% set _ = updated_clusters.append(cluster) %}
          {% endfor %}
          {{ updated_clusters }}
  vars:
    hub_cluster: "{{ clusters[0] }}"

  tasks:
    - name: Display CUDN deployment overview
      debug:
        msg:
          - "=========================================="
          - "ClusterUserDefinedNetwork (CUDN) Deployment"
          - "=========================================="
          - "Creating Layer 2 network for KubeVirt VMs"
          - ""
          - "Configuration:"
          - "  Network: {{ cudn_network_name }}"
          - "  CIDR: {{ cudn_cidr }}"
          - "  Namespace: {{ cudn_vm_namespace }}"
          - "  Topology: Layer2 with persistent IPAM"
          - ""
          - "BGP Integration:"
          - "  - FRR routers configured for {{ cudn_cidr }}"
          - "  - VPC routes point to BGP routers"
          - "  - Routes advertised automatically on VM creation"
          - "=========================================="

    - name: Deploy CUDN infrastructure
      include_role:
        name: cudn
      vars:
        hub_kubeconfig: "{{ hub_cluster.install_dir }}/auth/kubeconfig"

  post_tasks:
    - name: Display CUDN deployment summary
      debug:
        msg:
          - "=========================================="
          - "ClusterUserDefinedNetwork Deployed"
          - "=========================================="
          - "Network: {{ cudn_network_name }}"
          - "CIDR: {{ cudn_cidr }}"
          - "Namespace: {{ cudn_vm_namespace }}"
          - "Deployed to: Both hub and managed clusters"
          - ""
          - "Next steps:"
          - "  1. Create VirtualMachine in {{ cudn_vm_namespace }}"
          - "  2. VM will receive IP from {{ cudn_cidr }}"
          - "  3. BGP will advertise route automatically"
          - ""
          - "Verification:"
          - "  oc get clusteruserdefinednetwork"
          - "  oc get ns {{ cudn_vm_namespace }} --show-labels"
          - "  oc get nad -n {{ cudn_vm_namespace }}"
          - "=========================================="
