---
- name: Phase 7 - Bare Metal Machineset Creation
  hosts: bastion
  gather_facts: no
  become: yes
  vars_files:
    - /tmp/selected-domain.yml
  pre_tasks:
    - name: Load global variables
      include_vars:
        file: "{{ playbook_dir }}/../group_vars/all.yml"

    - name: Update clusters configuration with selected domain
      set_fact:
        clusters: |
          {% set updated_clusters = [] %}
          {% for cluster in clusters %}
          {% set _ = cluster.update({'base_domain': selected_base_domain}) %}
          {% set _ = updated_clusters.append(cluster) %}
          {% endfor %}
          {{ updated_clusters }}
  tasks:
    - name: Create bare metal machinesets for both clusters
      include_role:
        name: bare_metal
      vars:
        cluster_config: "{{ item }}"
        kubeconfig_path: "{{ item.install_dir }}/auth/kubeconfig"
      loop: "{{ clusters }}"
      loop_control:
        label: "{{ item.cluster_name }}"

  post_tasks:
    - name: Display machineset creation status
      debug:
        msg:
          - "Bare metal machinesets created successfully"
          - "Instance type: {{ bare_metal_instance_type }}"
          - "Replicas per cluster: {{ bare_metal_replicas }}"
          - "Total bare metal nodes: {{ bare_metal_replicas * 2 }}"
