---
- name: Phase 3 - Bastion Host Configuration
  hosts: bastion
  gather_facts: yes
  become: yes
  vars_files:
    - /tmp/selected-domain.yml
  pre_tasks:
    - name: Update clusters configuration with selected domain
      set_fact:
        clusters: |
          {% set updated_clusters = [] %}
          {% for cluster in clusters %}
          {% set _ = cluster.update({'base_domain': selected_base_domain}) %}
          {% set _ = updated_clusters.append(cluster) %}
          {% endfor %}
          {{ updated_clusters }}
  roles:
    - bastion

  post_tasks:
    - name: Display bastion configuration status
      debug:
        msg:
          - "Bastion host configured successfully"
          - "OpenShift installer: installed"
          - "OC client: installed"
          - "AWS CLI: configured"
          - "Helm: installed"
          - "Working directories: created"
          - "Pull secret: uploaded"
