---
- name: Dual OpenShift Cluster Deployment with ACM - Initialization
  hosts: localhost
  gather_facts: yes
  become: no
  vars_prompt:
    - name: pull_secret_path_input
      prompt: "Enter path to your OpenShift pull secret file"
      private: no
      default: "pull-secret.json"

  tasks:
    - name: Resolve pull secret path
      set_fact:
        pull_secret_path: "{{ pull_secret_path_input if pull_secret_path_input.startswith('/') else (playbook_dir + '/../' + pull_secret_path_input) | realpath }}"

    - name: Check if pull secret file exists
      stat:
        path: "{{ pull_secret_path }}"
      register: pull_secret_file

    - name: Fail if pull secret file not found
      fail:
        msg: |
          Pull secret file not found at: {{ pull_secret_path }}

          Download your pull secret from:
          https://console.redhat.com/openshift/install/pull-secret

          Save it as pull-secret.json in this directory, then re-run.
      when: not pull_secret_file.stat.exists

    - name: Read pull secret from file
      slurp:
        src: "{{ pull_secret_path }}"
      register: pull_secret_content
      no_log: true

    - name: Validate pull secret format
      set_fact:
        pull_secret_json: "{{ pull_secret_content.content | b64decode | from_json }}"
      no_log: true

    - name: Save pull secret to temporary file
      copy:
        content: "{{ pull_secret_content.content | b64decode }}"
        dest: /tmp/pull-secret.json
        mode: '0600'
      no_log: true

    - name: Display deployment overview
      debug:
        msg:
          - "=========================================="
          - "OpenShift Dual Cluster Deployment"
          - "=========================================="
          - "Starting deployment process..."
          - "Pull secret validated successfully"
          - ""
          - "NOTE: OpenShift installation will run on"
          - "      the bastion EC2 instance, not locally"
          - ""
          - "Estimated Total Time: 90-120 minutes"
          - "=========================================="

- import_playbook: 01-prerequisites.yml
- import_playbook: 02-infrastructure.yml
- import_playbook: 03-bastion-setup.yml
- import_playbook: 04-openshift-install.yml
- import_playbook: 05-acm-setup.yml
- import_playbook: 06-import-cluster.yml
- import_playbook: 07-frr-routers.yml  # EC2 routers with GRE to TGW (required for bastion-to-VM routing)
- import_playbook: 08-bare-metal-machinesets.yml
- import_playbook: 09-odf-setup.yml
- import_playbook: 10-virtualization-policy.yml
- import_playbook: 11-gitea-deployment.yml
- import_playbook: 11a-openshift-gitops.yml
- import_playbook: 12-cert-manager-setup.yml
- import_playbook: 13-virt-git-sync-setup.yml
- import_playbook: 14-bgp-configuration.yml
- import_playbook: 15-cudn-network.yml
# CUDN network configuration (playbook 15 handles core CUDN setup)
# Playbooks 15a-15c are intentional placeholders - functionality is covered by:
# - 15a: AWS security groups handled in playbook 15
# - 15b: FRR BGP config handled in playbook 14
# - 15c: Worker routing handled in playbook 14
- import_playbook: 15a-cudn-aws-config.yml
- import_playbook: 15b-frr-router-cudn-config.yml
- import_playbook: 15c-worker-cudn-config.yml
