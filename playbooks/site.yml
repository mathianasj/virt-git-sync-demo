---
- name: Dual OpenShift Cluster Deployment with ACM - Initialization
  hosts: localhost
  gather_facts: yes
  become: no
  vars_prompt:
    - name: pull_secret_path_input
      prompt: "Enter path to your OpenShift pull secret file"
      private: no
      default: "pull-secret.json"

  tasks:
    - name: Resolve pull secret path
      set_fact:
        pull_secret_path: "{{ pull_secret_path_input if pull_secret_path_input.startswith('/') else (playbook_dir + '/../' + pull_secret_path_input) | realpath }}"

    - name: Check if pull secret file exists
      stat:
        path: "{{ pull_secret_path }}"
      register: pull_secret_file

    - name: Fail if pull secret file not found
      fail:
        msg: |
          Pull secret file not found at: {{ pull_secret_path }}

          Download your pull secret from:
          https://console.redhat.com/openshift/install/pull-secret

          Save it as pull-secret.json in this directory, then re-run.
      when: not pull_secret_file.stat.exists

    - name: Read pull secret from file
      slurp:
        src: "{{ pull_secret_path }}"
      register: pull_secret_content
      no_log: true

    - name: Validate pull secret format
      set_fact:
        pull_secret_json: "{{ pull_secret_content.content | b64decode | from_json }}"
      no_log: true

    - name: Save pull secret to temporary file
      copy:
        content: "{{ pull_secret_content.content | b64decode }}"
        dest: /tmp/pull-secret.json
        mode: '0600'
      no_log: true

    - name: Display deployment overview
      debug:
        msg:
          - "=========================================="
          - "OpenShift Dual Cluster Deployment"
          - "=========================================="
          - "Starting deployment process..."
          - "Pull secret validated successfully"
          - ""
          - "NOTE: OpenShift installation will run on"
          - "      the bastion EC2 instance, not locally"
          - ""
          - "Estimated Total Time: 90-120 minutes"
          - "=========================================="

- import_playbook: 01-prerequisites.yml
- import_playbook: 02-infrastructure.yml
- import_playbook: 03-bastion-setup.yml
- import_playbook: 04-openshift-install.yml
- import_playbook: 05-acm-setup.yml
- import_playbook: 06-import-cluster.yml
# - import_playbook: 07-frr-routers.yml  # OPTIONAL: EC2 routers superseded by VPC Route Server (playbooks 16-18)
- import_playbook: 08-bare-metal-machinesets.yml
- import_playbook: 09-odf-setup.yml
- import_playbook: 10-virtualization-policy.yml
- import_playbook: 11-gitea-deployment.yml
- import_playbook: 12-cert-manager-setup.yml
- import_playbook: 13-virt-git-sync-setup.yml
- import_playbook: 14-bgp-configuration.yml
- import_playbook: 15-cudn-network.yml
- import_playbook: 16-transit-gateway-setup.yml
- import_playbook: 17-route-server-setup.yml
- import_playbook: 18-route-server-bgp.yml
- import_playbook: 19-windows-instance.yml

- name: Deployment Summary
  hosts: localhost
  gather_facts: no
  become: no
  vars_files:
    - /tmp/selected-domain.yml
  pre_tasks:
    - name: Load global variables
      include_vars:
        file: "{{ playbook_dir }}/../group_vars/all.yml"

    - name: Update clusters configuration with selected domain
      set_fact:
        clusters: |
          {% set updated_clusters = [] %}
          {% for cluster in clusters %}
          {% set _ = cluster.update({'base_domain': selected_base_domain}) %}
          {% set _ = updated_clusters.append(cluster) %}
          {% endfor %}
          {{ updated_clusters }}
  tasks:
    - name: Display deployment completion summary
      debug:
        msg:
          - "=========================================="
          - "Deployment Complete!"
          - "=========================================="
          - "Hub Cluster Console: https://console-openshift-console.apps.{{ clusters[0].cluster_name }}.{{ selected_base_domain }}"
          - "Managed Cluster Console: https://console-openshift-console.apps.{{ clusters[1].cluster_name }}.{{ selected_base_domain }}"
          - "ACM Console: https://multicloud-console.apps.{{ clusters[0].cluster_name }}.{{ selected_base_domain }}"
          - "Gitea URL: https://gitea-{{ gitea_namespace }}.apps.{{ clusters[0].cluster_name }}.{{ selected_base_domain }}"
          - ""
          - "Kubeconfig files are located on bastion:"
          - "  Hub: {{ clusters[0].install_dir }}/auth/kubeconfig"
          - "  Managed: {{ clusters[1].install_dir }}/auth/kubeconfig"
          - ""
          - "Network Infrastructure:"
          - "  Transit Gateway: Dynamic BGP routing with Connect attachments"
          - "  VPC Route Servers: Hub, Managed, and Bastion VPCs"
          - "  Shared VM Network (CUDN): {{ cudn_cidr }}"
          - "  - Advertised by both hub and managed clusters"
          - "  - Automatic failover via BGP path selection"
          - ""
          - "Windows Test Instance:"
          - "  Use RDP to connect and test failover scenarios"
          - "  See deployment output for credentials and IP address"
          - ""
          - "Next steps:"
          - "  1. SSH to bastion: ssh -i ~/.ssh/{{ bastion_key_name }} {{ bastion_user }}@{{ bastion_public_ip }}"
          - "  2. Export KUBECONFIG and verify clusters"
          - "  3. Access ACM console to manage both clusters"
          - "  4. Test VM connectivity and failover from Windows instance"
          - "=========================================="
