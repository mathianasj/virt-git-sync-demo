- name: Deployment Summary
  hosts: localhost
  gather_facts: no
  become: no
  vars_files:
    - /tmp/selected-domain.yml
  pre_tasks:
    - name: Load global variables
      include_vars:
        file: "{{ playbook_dir }}/../group_vars/all.yml"

    - name: Update clusters configuration with selected domain
      set_fact:
        clusters: |
          {% set updated_clusters = [] %}
          {% for cluster in clusters %}
          {% set _ = cluster.update({'base_domain': selected_base_domain}) %}
          {% set _ = updated_clusters.append(cluster) %}
          {% endfor %}
          {{ updated_clusters }}

    - name: Get bastion public IP from AWS
      shell: |
        aws ec2 describe-instances \
          --region {{ aws_region }} \
          --filters "Name=tag:Role,Values=bastion" "Name=instance-state-name,Values=running" \
          --query 'Reservations[0].Instances[0].PublicIpAddress' \
          --output text
      register: bastion_ip_result
      changed_when: false

    - name: Add bastion to inventory
      add_host:
        name: bastion_host
        groups: bastion_summary
        ansible_host: "{{ bastion_ip_result.stdout }}"
        ansible_user: "{{ bastion_user }}"
        ansible_ssh_private_key_file: "~/.ssh/{{ bastion_key_name }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
        ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Get ArgoCD admin password from bastion
      shell: |
        oc get secret openshift-gitops-cluster -n openshift-gitops -o jsonpath='{.data.admin\.password}' | base64 -d
      environment:
        KUBECONFIG: "{{ clusters[0].install_dir }}/auth/kubeconfig"
      register: argocd_password
      changed_when: false
      delegate_to: bastion_host

    - name: Display deployment completion summary
      debug:
        msg:
          - "=========================================="
          - "Deployment Complete!"
          - "=========================================="
          - "Hub Cluster Console: https://console-openshift-console.apps.{{ clusters[0].cluster_name }}.{{ selected_base_domain }}"
          - "Managed Cluster Console: https://console-openshift-console.apps.{{ clusters[1].cluster_name }}.{{ selected_base_domain }}"
          - "ACM Console: https://multicloud-console.apps.{{ clusters[0].cluster_name }}.{{ selected_base_domain }}"
          - ""
          - "Gitea URL: https://gitea-{{ gitea_namespace }}.apps.{{ clusters[0].cluster_name }}.{{ selected_base_domain }}"
          - "  Username: {{ gitea_admin_user }}"
          - "  Password: {{ gitea_admin_password }}"
          - ""
          - "ArgoCD Console: https://openshift-gitops-server-openshift-gitops.apps.{{ clusters[0].cluster_name }}.{{ selected_base_domain }}"
          - "  Username: admin"
          - "  Password: {{ argocd_password.stdout }}"
          - ""
          - "Kubeconfig files are located on bastion:"
          - "  Hub: {{ clusters[0].install_dir }}/auth/kubeconfig"
          - "  Managed: {{ clusters[1].install_dir }}/auth/kubeconfig"
          - ""
          - "Network Infrastructure:"
          - "  Transit Gateway: Dynamic BGP routing with Connect attachments"
          - "  VPC Route Servers: Hub, Managed, and Bastion VPCs"
          - "  Shared VM Network (CUDN): {{ cudn_cidr }}"
          - "  - Advertised by both hub and managed clusters"
          - "  - Automatic failover via BGP path selection"
          - ""
          - "Windows Test Instance:"
          - "  Use RDP to connect and test failover scenarios"
          - "  See deployment output for credentials and IP address"
          - ""
          - "Next steps:"
          - "  1. SSH to bastion: ssh -i ~/.ssh/{{ bastion_key_name }} {{ bastion_user }}@{{ bastion_ip_result.stdout }}"
          - "  2. Export KUBECONFIG and verify clusters"
          - "  3. Access ACM console to manage both clusters"
          - "  4. Access ArgoCD console for GitOps workflows"
          - "  5. Test VM connectivity and failover from Windows instance"
          - "=========================================="
